

name: Pytest

on: 
  push:
    branches:
      - main
  pull_request:
    branches:
      - main

jobs:
  pytest:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v3

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: 3.9

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements-dev.txt
      
      - name: Show python & pip info
        run: |
          python -V
          pip -V
          pip list --format=columns

      - name: List repo files
        run: |
          echo "Top-level:"
          ls -la
          echo "Repo recursive:"
          ls -laR

      - name: Show pytest & plugin versions
        run: |
          python - <<'PY'
          import sys
          try:
              import pytest, importlib, pkgutil
              print("pytest:", pytest.__version__)
          except Exception as e:
              print("Could not import pytest:", e)
          try:
              import pytest_asyncio
              print("pytest-asyncio:", pytest_asyncio.__version__)
          except Exception as e:
              print("Could not import pytest-asyncio:", e)
          try:
              import pytest_cov
              print("pytest-cov:", pytest_cov.__version__)
          except Exception as e:
              print("Could not import pytest-cov:", e)
          print("sys.path:", sys.path)
          PY

      - name: Install system dependencies (Xvfb & GL/SDL deps)
        run: |
          sudo apt-get update
          sudo apt-get install -y xvfb x11-utils
          sudo apt-get install -y libsdl2-2.0-0 libsdl2-dev libgles2-mesa-dev libgl1-mesa-dev libgl1-mesa-dri mesa-utils \
            gstreamer1.0-plugins-base

      - name: Run pytest under Xvfb
        run: |
          # start Xvfb automatically around the command
          xvfb-run -a -s "-screen 0 1280x720x24" python -m pytest -vv -s --cov=GuiApp --cov-branch --cov-report=html --cov-report=xml --cov-report=term-missing --junitxml=junit.xml

      - name: Upload pytest test results
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: pytest-results
          path: junit.xml

      - name: Upload coverage HTML report
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: coverage-report
          path: htmlcov/

      - name: Extract coverage percentage
        if: always()
        id: coverage
        run: |
          import xml.etree.ElementTree as ET
          tree = ET.parse("coverage.xml")
          root = tree.getroot()
          line_rate = float(root.attrib["line-rate"])
          coverage_pct = round(line_rate * 100, 1)
          print(f"Coverage: {coverage_pct}%")
          # Write to GITHUB_OUTPUT for use in next step
          import os
          with open(os.environ["GITHUB_OUTPUT"], "a") as f:
              f.write(f"coverage_pct={coverage_pct}\n")
        shell: python

      - name: Update coverage badge
        if: always()
        uses: schneegans/dynamic-badges-action@v1.7.0
        with:
          auth: ${{ secrets.GIST_TOKEN }}
          gistID: 96b0d2232509808bb39c8fd3a4435cc3
          filename: coverage.json
          label: coverage
          message: ${{ steps.coverage.outputs.coverage_pct || 'N/A' }}%
          color: brightgreen
          namedLogo: pytest